# Fly.io configuration. Update `app` name before first deploy: `fly launch --no-deploy`.
app = "games-night"
primary_region = "lhr"

[build]
  dockerfile = "apps/api/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  HOST = "0.0.0.0"
  ENABLE_SWAGGER = "false"

[deploy]
  release_command = "pnpm --filter @games-night/api prisma:deploy"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[[services.tcp_checks]]
  grace_period = "10s"
  interval = "15s"
  timeout = "2s"
